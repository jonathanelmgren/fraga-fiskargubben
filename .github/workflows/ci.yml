name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Biome
        run: pnpm biome:ci

      - name: Typecheck
        run: pnpm ts:check

      - name: Unit tests
        run: pnpm test

  db-tests:
    runs-on: ubuntu-latest

    # Postgres service container for the DB-gated integration tests
    # (src/lib/lakes/resolve.test.ts). Uses the PostGIS image because migration
    # 0015 runs `CREATE EXTENSION postgis` (needed by the Lantmäteriet lake ETL);
    # pg_trgm + the trigram/expression indexes come from the other migrations.
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fiskargubben_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # The integration tests gate on DATABASE_URL; drizzle-kit migrate and the
      # test DB client both read it. Not a secret — it points at the ephemeral
      # service container above.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/fiskargubben_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Applies every migration in ./drizzle in journal order, including
      # CREATE EXTENSION pg_trgm and the trigram/expression indexes the
      # lake-resolution queries depend on.
      - name: Apply migrations
        run: pnpm db:migrate

      # The lake-resolution integration tests seed their own fixtures in
      # beforeEach and clean up in afterEach, so no separate seed step is
      # needed. With DATABASE_URL set they run instead of skipping.
      - name: Tests (with database)
        run: pnpm test
