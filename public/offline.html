<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#22403a" />
    <title>Offline — Fråga Fiskargubben</title>
    <!-- Self-contained on purpose: this page is precached by the service
         worker and must render without any network access, so no external
         CSS/JS/font references. Colors mirror the app's light theme tokens. -->
    <style>
      :root {
        --background: #f2eee2;
        --foreground: #22403a;
        --muted-foreground: #7d7663;
        --primary: #22403a;
        --primary-foreground: #f2eee2;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 6rem 1rem;
        text-align: center;
        background: var(--background);
        color: var(--foreground);
        font-family:
          ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      p {
        margin: 0;
      }
      .kicker {
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--muted-foreground);
      }
      h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.025em;
      }
      .lead {
        max-width: 24rem;
        font-size: 0.875rem;
        line-height: 1.4;
        color: var(--muted-foreground);
      }
      button {
        margin-top: 0.5rem;
        border: 0;
        border-radius: 0.5rem;
        background: var(--primary);
        color: var(--primary-foreground);
        padding: 0.625rem 1.25rem;
        font: inherit;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <p class="kicker">Offline</p>
    <h1>Ingen kontakt med land.</h1>
    <p class="lead">
      Gubben når varken vädret eller vattnet just nu. Kolla din uppkoppling och
      försök igen.
    </p>
    <button type="button" onclick="location.reload()">Försök igen</button>
  </body>
</html>
