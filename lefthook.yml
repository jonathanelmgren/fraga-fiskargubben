pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css}"
      run: pnpm exec biome check --write --files-ignore-unknown=true --no-errors-on-unmatched {staged_files}
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    biome:
      run: pnpm biome:ci
    ts-check:
      run: pnpm ts:check
    test:
      run: pnpm test
    rev-dep:
      run: pnpm exec rev-dep config run
